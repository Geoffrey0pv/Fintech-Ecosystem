# One command brings up DB (with a real persistent volume), backend and frontend:
#   docker-compose up --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-fintech_movements}
    volumes:
      - pgdata:/var/lib/postgresql/data # real persistence
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fintech} -d ${POSTGRES_DB:-fintech_movements}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fintech}:${POSTGRES_PASSWORD:-change_me_in_prod}@db:5432/${POSTGRES_DB:-fintech_movements}?schema=public
      FRONTEND_URL: http://localhost:3000
      ACCESS_TOKEN_TTL: '900'
      REFRESH_TOKEN_TTL: '604800'
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-demo@fintech.co}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-Demo1234!}
      # JWT_PRIVATE_KEY / JWT_PUBLIC_KEY optional: auto-generated for dev if absent.
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pgdata:
