name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fintech
          POSTGRES_PASSWORD: fintech
          POSTGRES_DB: fintech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fintech"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://fintech:fintech@localhost:5432/fintech_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace @fintech/backend

      - name: Lint (static analysis)
        run: npm run lint --workspaces --if-present

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Apply migrations
        run: npm run prisma:deploy --workspace @fintech/backend

      - name: Backend unit tests (coverage)
        run: npm run test:cov --workspace @fintech/backend

      - name: Backend e2e tests (real PostgreSQL)
        run: npm run test:e2e --workspace @fintech/backend
        env:
          NODE_ENV: test

      - name: Frontend tests (coverage)
        run: npm run test:cov --workspace @fintech/frontend

      - name: Frontend production build
        run: npm run build --workspace @fintech/frontend

      # Optional deep static analysis; runs only when a SONAR_TOKEN secret is set.
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-images:
    needs: quality-and-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t fintech-backend .
      - name: Build frontend image
        run: docker build -f apps/frontend/Dockerfile -t fintech-frontend .
